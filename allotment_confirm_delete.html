{% extends 'nia_app/base.html' %}
{% block title %}Delete Allotment Record — NIA{% endblock %}
{% block content %}
<div style="max-width:500px;margin:2rem auto;">
    <div class="card">
        <div class="card-header" style="background:#b91c1c;">⚠️ Confirm Deletion</div>
        <div class="card-body" style="text-align:center;padding:2rem;">
            <p style="font-size:1rem;margin-bottom:.5rem;">Are you sure you want to delete:</p>
            <p style="font-weight:700;font-size:1rem;margin-bottom:.4rem;">{{ record.project_name }}</p>
            <p style="font-family:'IBM Plex Mono',monospace;font-size:.85rem;margin-bottom:1.5rem;color:var(--text-muted);">ADA No: {{ record.ada_number }}</p>
            <div style="display:flex;gap:1rem;justify-content:center;">
                <a href="{% url 'allotment_list' %}" class="btn btn-outline">Cancel</a>
                <form method="post" style="display:inline;">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger">Yes, Delete</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
